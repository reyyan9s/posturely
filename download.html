<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Download Posturely — your wellness companion for MacBook notch." />
  <title>Download Posturely — Your download is ready!</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='20' rx='8' fill='%231c1a17'/><circle cx='16' cy='20' r='5' fill='%238cb98a'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Caveat:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #faf8f3;
      --text: #1c1a17;
      --muted: #7a7568;
      --accent: #8cb98a;
      --accent-dark: #5a8f57;
      --border: rgba(28, 26, 23, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(28, 26, 23, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(28, 26, 23, 0.05) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(circle at 50% 50%, black 20%, transparent 85%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, black 20%, transparent 85%);
    }

    /* Ambient blobs */
    .blob-container {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: absolute;
      filter: blur(100px);
      opacity: 0.5;
      border-radius: 50%;
      animation: floatBlob 20s infinite alternate ease-in-out;
    }

    .blob-1 {
      background: #d8b8b8;
      width: 350px;
      height: 350px;
      top: 15%;
      left: 10%;
    }

    .blob-2 {
      background: #8cb98a;
      width: 400px;
      height: 400px;
      bottom: 10%;
      right: 10%;
      animation-duration: 25s;
      animation-delay: -5s;
    }

    .blob-3 {
      background: #b8b0d8;
      width: 300px;
      height: 300px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-duration: 22s;
      animation-delay: -10s;
    }

    @keyframes floatBlob {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(80px, -40px) scale(1.1); }
      66% { transform: translate(-40px, 80px) scale(0.9); }
      100% { transform: translate(0, 0) scale(1); }
    }

    /* Main content */
    .download-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 24px;
      max-width: 520px;
      animation: fadeIn 0.8s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Success icon */
    .success-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 8px 32px rgba(90, 143, 87, 0.3);
      animation: popIn 0.6s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.5);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .success-icon svg {
      width: 32px;
      height: 32px;
      color: white;
    }

    /* Heading */
    .download-heading {
      font-family: 'Lora', serif;
      font-size: clamp(36px, 6vw, 52px);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.035em;
      color: #111;
      margin-bottom: 14px;
    }

    .download-heading em {
      font-style: italic;
      color: var(--accent-dark);
    }

    /* Subtitle */
    .download-sub {
      font-size: 17px;
      color: #666;
      line-height: 1.65;
      margin-bottom: 40px;
      max-width: 400px;
    }

    /* Download button */
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--text);
      color: var(--bg);
      padding: 16px 36px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 4px 24px rgba(28, 26, 23, 0.2);
      font-family: 'DM Sans', system-ui, sans-serif;
      cursor: pointer;
      border: none;
    }

    .btn-download::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent);
      transform: skewX(-20deg);
      transition: 0.6s ease;
    }

    .btn-download:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(28, 26, 23, 0.3);
    }

    .btn-download:hover::after {
      left: 200%;
    }

    /* Helper note */
    .helper-note {
      font-family: 'Caveat', cursive;
      font-size: 15px;
      color: var(--muted);
      margin-top: 20px;
      opacity: 0.72;
    }

    /* Back link */
    .back-link {
      margin-top: 40px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--text);
    }

    /* Badge */
    .dl-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 28px;
      box-shadow: 0 2px 16px rgba(28, 26, 23, 0.05);
    }

    .dl-badge-pip {
      width: 6px;
      height: 6px;
      background: var(--accent-dark);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Confetti particles */
    .confetti {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      z-index: 0;
      animation: confettiFall linear forwards;
      pointer-events: none;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translateY(-10vh) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translateY(110vh) rotate(720deg);
      }
    }
  </style>
</head>

<body>

  <!-- Ambient blobs -->

    <a href="index.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7" />

  </div>

  <script>
    // Subtle confetti celebration on load
    (function createConfetti() {
      const colors = ['#8cb98a', '#b8b0d8', '#d8b8b8', '#d8cdb0', '#5a8f57'];
      const container = document.body;
      for (let i = 0; i < 40; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (Math.random() * 6 + 4) + 'px';
        el.style.height = (Math.random() * 6 + 4) + 'px';
        el.style.animationDuration = (Math.random() * 2 + 2) + 's';
        el.style.animationDelay = (Math.random() * 1.5) + 's';
        container.appendChild(el);
        // Remove after animation
        setTimeout(() => el.remove(), 5000);
      }
    })();
  </script>

</body>
</html>
